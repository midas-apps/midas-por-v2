name: Static Checks

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          use-policy-store: true
          api-key: ${{ secrets.STEP_SECURITY_API_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version: 22
          cache: yarn

      - name: Setup safe-chain v1.5.3
        shell: bash
        run: |
          curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh -o install-safe-chain.sh
          echo "0107cbbbf90159379756157e902acae512d62ffbd174307e42c5fe9f266792d3  install-safe-chain.sh" | sha256sum -c -
          sh install-safe-chain.sh --ci

      - run: yarn
      - run: yarn build
